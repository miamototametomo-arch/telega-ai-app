<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a12;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #12121c;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #1f1f30;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a2a;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .balance { font-size: 24px; font-weight: 700; color: #ffd700; }
        .online { font-size: 14px; color: #888; background: #0a0a14; padding: 4px 14px; border-radius: 30px; }
        .lang-btn {
            background: transparent;
            border: none;
            font-size: 22px;
            cursor: pointer;
            padding: 0 6px;
        }
        .game-selector {
            display: flex;
            gap: 6px;
            margin: 16px 0;
            background: #1a1a2a;
            padding: 6px;
            border-radius: 16px;
        }
        .game-btn {
            flex: 1;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
        }
        .game-btn.active { background: #ffd700; color: #0a0a12; }
        .game-btn:active { transform: scale(0.95); }
        .bet-section {
            background: #1a1a2a;
            padding: 16px;
            border-radius: 16px;
            margin: 12px 0;
        }
        .bet-label { color: #aaa; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .bet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .bet-btn {
            padding: 10px 0;
            background: #2a2a3e;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .bet-btn:active { transform: scale(0.92); }
        .bet-btn.selected { background: #ffd700; color: #0a0a12; }
        .bet-btn.custom { background: #3a3a4e; font-size: 20px; }
        .bet-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .game-area {
            background: #12121c;
            border-radius: 20px;
            padding: 16px;
            min-height: 260px;
            margin-top: 12px;
            border: 1px solid #1a1a2a;
            position: relative;
        }
        .cashout-btn {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            color: #0a0a12;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cashout-btn:active { transform: scale(0.96); }
        .cashout-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .miner-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 12px 0;
        }
        .miner-cell {
            aspect-ratio: 1;
            background: #2a2a3e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: 0.15s;
        }
        .miner-cell:active { transform: scale(0.88); }
        .miner-cell.opened { background: #1a1a2a; cursor: default; }
        .graph {
            width: 100%;
            height: 140px;
            background: #0a0a14;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid #1f1f30;
        }
        .graph .line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, #ffd700 0%, transparent 70%);
            clip-path: polygon(0% 100%, 0% 80%, 20% 60%, 40% 40%, 60% 30%, 80% 10%, 100% 0%, 100% 100%);
        }
        .graph .label {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
        }
        .status-text { text-align: center; margin-top: 12px; font-size: 15px; color: #aaa; }
        .multiplier-display { font-size: 22px; color: #ffd700; margin: 8px 0; font-weight: 700; }
        .footer { text-align: center; font-size: 11px; color: #2a2a3a; margin-top: 16px; }
        .history-table {
            margin-top: 16px;
            background: #1a1a2a;
            border-radius: 16px;
            padding: 12px;
            max-height: 120px;
            overflow-y: auto;
        }
        .history-table .row {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #2a2a3a;
            font-size: 13px;
        }
        .history-table .row:last-child { border-bottom: none; }
        .history-table .win { color: #00ff88; }
        .history-table .lose { color: #ff4444; }
        .history-table .history-label { color: #888; font-size: 12px; margin-bottom: 6px; }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="balance" id="balanceDisplay">💰 0.00$</div>
        <div class="online" id="onlineDisplay">👥 0</div>
        <button class="lang-btn" onclick="switchLang()" id="langBtn">🇷🇺</button>
    </div>

    <div class="game-selector">
        <button class="game-btn active" id="gameAviator" onclick="selectGame('aviator')">✈️ Aviator</button>
        <button class="game-btn" id="gameRocket" onclick="selectGame('rocket')">🚀 Rocket</button>
        <button class="game-btn" id="gameMiner" onclick="selectGame('miner')">⛏️ Майнер</button>
    </div>

    <div class="bet-section">
        <div class="bet-label" id="betLabel">Сумма ставки</div>
        <div class="bet-grid">
            <button class="bet-btn" onclick="selectBet(1)">1$</button>
            <button class="bet-btn" onclick="selectBet(5)">5$</button>
            <button class="bet-btn selected" onclick="selectBet(10)">10$</button>
            <button class="bet-btn" onclick="selectBet(25)">25$</button>
            <button class="bet-btn" onclick="selectBet(50)">50$</button>
            <button class="bet-btn custom" onclick="customBet()">⚡</button>
        </div>
    </div>

    <div class="game-area" id="gameArea">
        <div id="gameContent"></div>
    </div>

    <div class="history-table" id="historyTable">
        <div class="history-label" id="historyLabel">📊 Последние 10 раундов</div>
        <div id="historyList"></div>
    </div>

    <div class="footer">Casino • v3.29.1</div>
</div>

<script>
    // ===== ЯЗЫКИ =====
    const LANG = {
        ru: {
            betLabel: 'Сумма ставки',
            historyLabel: '📊 Последние 10 раундов',
            cashout: '💰 ЗАБРАТЬ',
            crash: '💥 Проигрыш!',
            win: '✅ Выигрыш: {win}$ (x{coef})',
            noMoney: '❌ Недостаточно средств!',
            chooseGame: '👇 Выберите игру и сделайте ставку'
        },
        en: {
            betLabel: 'Bet amount',
            historyLabel: '📊 Last 10 rounds',
            cashout: '💰 CASH OUT',
            crash: '💥 Loss!',
            win: '✅ Win: {win}$ (x{coef})',
            noMoney: '❌ Insufficient funds!',
            chooseGame: '👇 Choose a game and place a bet'
        },
        kz: {
            betLabel: 'Ставка сомасы',
            historyLabel: '📊 Соңғы 10 раунд',
            cashout: '💰 АЛУ',
            crash: '💥 Ұтылыс!',
            win: '✅ Ұтыс: {win}$ (x{coef})',
            noMoney: '❌ Қаражат жеткіліксіз!',
            chooseGame: '👇 Ойынды таңдап, ставка жасаңыз'
        }
    };

    let currentLang = 'ru';
    let balance = 100;
    let currentGame = 'aviator';
    let currentBet = 10;
    let gameInterval = null;
    let gameActive = false;
    let isFlying = false;
    let history = [];
    let tg = window.Telegram?.WebApp;

    // ===== СОХРАНЕНИЕ БАЛАНСА =====
    function saveBalance() {
        localStorage.setItem('casino_balance', balance.toString());
    }

    function loadBalance() {
        const saved = localStorage.getItem('casino_balance');
        if (saved !== null) balance = parseFloat(saved);
        else balance = 100;
        updateBalanceUI();
    }

    function updateBalanceUI() {
        document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)}$`;
        saveBalance();
    }

    function updateOnlineUI(count) {
        document.getElementById('onlineDisplay').textContent = `👥 ${count}`;
    }

    function updateBetUI() {
        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (btn.textContent.includes(currentBet + '$')) btn.classList.add('selected');
        });
    }

    function sendData(action, payload = {}) {
        const data = JSON.stringify({ action, ...payload });
        if (tg) tg.sendData(data);
        else console.log('📤 Send:', data);
    }

    function loadData() {
        sendData('get_balance');
        sendData('get_online');
    }

    if (tg) {
        tg.ready();
        tg.onEvent('data', (data) => {
            try {
                const json = JSON.parse(data);
                if (json.balance !== undefined) { balance = json.balance; updateBalanceUI(); }
                if (json.win !== undefined) { balance += json.win; updateBalanceUI(); }
                if (json.online !== undefined) updateOnlineUI(json.online);
            } catch (e) {}
        });
        setTimeout(loadData, 300);
    } else {
        loadBalance();
        updateOnlineUI(42);
    }

    // ===== ЯЗЫК =====
    function switchLang() {
        const langs = ['ru', 'en', 'kz'];
        let idx = langs.indexOf(currentLang);
        idx = (idx + 1) % langs.length;
        currentLang = langs[idx];
        document.getElementById('langBtn').textContent = currentLang === 'ru' ? '🇷🇺' : currentLang === 'en' ? '🇬🇧' : '🇰🇿';
        updateUITexts();
    }

    function updateUITexts() {
        document.getElementById('betLabel').textContent = LANG[currentLang].betLabel;
        document.getElementById('historyLabel').textContent = LANG[currentLang].historyLabel;
        renderHistory();
    }

    // ===== ИСТОРИЯ =====
    function addHistory(coef) {
        history.push(coef);
        if (history.length > 10) history.shift();
        renderHistory();
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        if (history.length === 0) {
            list.innerHTML = '<div class="row" style="color:#666;">Нет данных</div>';
            return;
        }
        let html = '';
        for (let i = history.length - 1; i >= 0; i--) {
            const val = history[i];
            const cls = val >= 5 ? 'win' : 'lose';
            html += `<div class="row"><span>Раунд #${i+1}</span><span class="${cls}">x${val.toFixed(1)}</span></div>`;
        }
        list.innerHTML = html;
    }

    // ===== ВЫБОР ИГРЫ =====
    function selectGame(game) {
        if (gameInterval) clearInterval(gameInterval);
        gameActive = false;
        isFlying = false;
        currentGame = game;
        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('game' + game.charAt(0).toUpperCase() + game.slice(1)).classList.add('active');
        document.getElementById('gameContent').innerHTML = `<div style="text-align:center;color:#888;padding:20px;">${LANG[currentLang].chooseGame}</div>`;
        enableBets(true);
        if (game !== 'miner') startRound();
    }

    // ===== СТАВКИ =====
    function selectBet(amount) {
        if (isFlying) return;
        currentBet = amount;
        updateBetUI();
    }

    function customBet() {
        if (isFlying) return;
        const amount = prompt('Введите сумму (1-1000$):', '10');
        if (amount && !isNaN(amount) && amount > 0 && amount <= 1000) {
            currentBet = parseFloat(amount);
            updateBetUI();
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
        }
    }

    function enableBets(enabled) {
        document.querySelectorAll('.bet-btn').forEach(b => b.disabled = !enabled);
    }

    // ===== ЗАПУСК РАУНДА =====
    function startRound() {
        if (currentBet > balance) {
            document.getElementById('gameContent').innerHTML = `<div style="text-align:center;color:#ff4444;padding:20px;">${LANG[currentLang].noMoney}</div>`;
            setTimeout(() => { if (currentGame !== 'miner') startRound(); }, 3000);
            return;
        }

        balance -= currentBet;
        updateBalanceUI();
        enableBets(false);
        isFlying = true;
        gameActive = true;

        // Шансы: 40% → x2, 30% → x3, 20% → x4, 10% → x5
        const roll = Math.random();
        let targetCoef;
        if (roll < 0.40) targetCoef = 2.0;
        else if (roll < 0.70) targetCoef = 3.0;
        else if (roll < 0.90) targetCoef = 4.0;
        else targetCoef = 5.0;

        // Для визуального продолжения после кэшаута
        const extraCoef = 6 + Math.random() * 6; // 6-12

        const content = document.getElementById('gameContent');
        const isRocket = currentGame === 'rocket';
        content.innerHTML = `
            <div class="graph">
                <div class="line"></div>
                <div class="label" id="gameCoef">1.00x</div>
            </div>
            <div class="multiplier-display" id="gameMultiplier">x1.00</div>
            <button class="cashout-btn" id="gameCashout" onclick="cashout()">${LANG[currentLang].cashout}</button>
            <div class="status-text" id="gameStatus">${isRocket ? '🚀 Взлетает...' : '✈️ Летит...'}</div>
        `;

        let coef = 1.0;
        let cashedOut = false;
        const coefLabel = document.getElementById('gameCoef');
        const multLabel = document.getElementById('gameMultiplier');
        const status = document.getElementById('gameStatus');
        const cashoutBtn = document.getElementById('gameCashout');

        if (gameInterval) clearInterval(gameInterval);
        gameInterval = setInterval(() => {
            if (!gameActive) return;
            coef += 0.02 + Math.random() * 0.05;
            coefLabel.textContent = coef.toFixed(2) + 'x';
            multLabel.textContent = 'x' + coef.toFixed(2);

            // Если достигли целевого коэффициента и игрок не забрал — падаем
            if (coef >= targetCoef && !cashedOut) {
                clearInterval(gameInterval);
                gameActive = false;
                isFlying = false;
                cashoutBtn.disabled = true;
                cashoutBtn.textContent = '💥 CRASH';
                status.textContent = LANG[currentLang].crash;
                addHistory(targetCoef);
                enableBets(true);
                sendData(currentGame + '_result', { win: 0 });
                // Запускаем следующий раунд через 4 секунды
                setTimeout(() => { if (currentGame !== 'miner') startRound(); }, 4000);
                return;
            }

            // Если игрок забрал — летим до extraCoef, потом падаем
            if (cashedOut && coef >= extraCoef) {
                clearInterval(gameInterval);
                gameActive = false;
                isFlying = false;
                cashoutBtn.disabled = true;
                cashoutBtn.textContent = '💥 CRASH';
                status.textContent = '💥 Самолёт разбился (после кэшаута)';
                addHistory(coef);
                enableBets(true);
                setTimeout(() => { if (currentGame !== 'miner') startRound(); }, 4000);
                return;
            }
        }, 80);
    }

    // ===== КЭШАУТ =====
    function cashout() {
        if (!gameActive || !isFlying) return;
        const coef = parseFloat(document.getElementById('gameCoef').textContent);
        const win = currentBet * coef;
        balance += win;
        updateBalanceUI();
        const status = document.getElementById('gameStatus');
        status.textContent = LANG[currentLang].win.replace('{win}', win.toFixed(2)).replace('{coef}', coef.toFixed(2));
        document.getElementById('gameCashout').disabled = true;
        sendData(currentGame + '_result', { win: win });
        // Помечаем, что игрок забрал — самолёт продолжит лететь до extraCoef
        window._cashedOut = true;
        // Отключаем кнопку кэшаута
        document.getElementById('gameCashout').onclick = null;
        // В интервале cashedOut станет true, и он полетит до extraCoef
    }

    // ===== МАЙНЕР =====
    // (без изменений, оставляем как есть)

    // ===== ИНИЦИАЛИЗАЦИЯ =====
    selectGame('aviator');
    updateUITexts();
</script>
</body>
</html>
