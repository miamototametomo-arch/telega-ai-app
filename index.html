    <title>Casino WebApp</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0d0d0d;
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 24px;
            padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 200, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .balance {
            font-size: 24px;
            font-weight: bold;
            color: #00ffc8;
        }
        .online {
            font-size: 14px;
            color: #888;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
            margin: 20px 0;
        }
        .menu-btn {
            background: #2a2a2a;
            padding: 16px 0;
            border-radius: 16px;
            text-align: center;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            color: #fff;
        }
        .menu-btn:active { transform: scale(0.95); }
        .menu-btn.green { background: #00c853; }
        .menu-btn.red { background: #d50000; }
        .menu-btn.purple { background: #aa00ff; }

        .game-area {
            background: #121212;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            min-height: 300px;
            position: relative;
        }

        /* Aviator */
        .graph {
            width: 100%;
            height: 150px;
            background: #0a0a0a;
            border-radius: 12px;
            position: relative;
            overflow: hidden;
        }
        .graph .line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, #00ffc8 0%, transparent 80%);
            clip-path: polygon(0% 100%, 0% 80%, 20% 60%, 40% 40%, 60% 30%, 80% 10%, 100% 0%, 100% 100%);
        }
        .graph .label {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #00ffc8;
        }

        /* Miner */
        .miner-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .miner-cell {
            aspect-ratio: 1;
            background: #2a2a2a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            cursor: pointer;
            transition: 0.2s;
        }
        .miner-cell:active { transform: scale(0.9); }
        .miner-cell.opened { background: #1a1a1a; }

        .cashout-btn {
            width: 100%;
            padding: 16px;
            background: #00c853;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 16px;
            cursor: pointer;
        }
        .cashout-btn:active { transform: scale(0.96); }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #555;
            text-align: center;
        }

        .hidden { display: none; }
    </style>
</head>
