<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Casino</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0a0a12;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: #12121c;
            border-radius: 28px;
            padding: 20px;
            border: 1px solid #1f1f30;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1a1a2a;
            padding: 14px 18px;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .balance { font-size: 24px; font-weight: 700; color: #ffd700; }
        .online { font-size: 14px; color: #888; background: #0a0a14; padding: 4px 14px; border-radius: 30px; }
        .game-selector {
            display: flex;
            gap: 6px;
            margin: 16px 0;
            background: #1a1a2a;
            padding: 6px;
            border-radius: 16px;
        }
        .game-btn {
            flex: 1;
            padding: 12px 0;
            background: transparent;
            border: none;
            color: #888;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            border-radius: 12px;
            transition: 0.3s;
        }
        .game-btn.active { background: #ffd700; color: #0a0a12; }
        .game-btn:active { transform: scale(0.95); }
        .bet-section {
            background: #1a1a2a;
            padding: 16px;
            border-radius: 16px;
            margin: 12px 0;
        }
        .bet-label { color: #aaa; font-size: 12px; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        .bet-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 8px;
        }
        .bet-btn {
            padding: 10px 0;
            background: #2a2a3e;
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }
        .bet-btn:active { transform: scale(0.92); }
        .bet-btn.selected { background: #ffd700; color: #0a0a12; }
        .bet-btn.custom { background: #3a3a4e; font-size: 20px; }
        .game-area {
            background: #12121c;
            border-radius: 20px;
            padding: 16px;
            min-height: 260px;
            margin-top: 12px;
            border: 1px solid #1a1a2a;
            position: relative;
        }
        .start-btn {
            width: 100%;
            padding: 16px;
            background: #ffd700;
            border: none;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 700;
            color: #0a0a12;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 12px;
        }
        .start-btn:active { transform: scale(0.96); }
        .start-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .cashout-btn {
            width: 100%;
            padding: 14px;
            background: #ffd700;
            border: none;
            border-radius: 16px;
            font-size: 18px;
            font-weight: 700;
            color: #0a0a12;
            margin-top: 12px;
            cursor: pointer;
            transition: 0.2s;
        }
        .cashout-btn:active { transform: scale(0.96); }
        .cashout-btn:disabled { background: #444; color: #888; cursor: not-allowed; }
        .miner-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin: 12px 0;
        }
        .miner-cell {
            aspect-ratio: 1;
            background: #2a2a3e;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            cursor: pointer;
            user-select: none;
            transition: 0.15s;
        }
        .miner-cell:active { transform: scale(0.88); }
        .miner-cell.opened { background: #1a1a2a; cursor: default; }
        .graph {
            width: 100%;
            height: 140px;
            background: #0a0a14;
            border-radius: 16px;
            position: relative;
            overflow: hidden;
            border: 1px solid #1f1f30;
        }
        .graph .line {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, #ffd700 0%, transparent 70%);
            clip-path: polygon(0% 100%, 0% 80%, 20% 60%, 40% 40%, 60% 30%, 80% 10%, 100% 0%, 100% 100%);
        }
        .graph .label {
            position: absolute;
            top: 10px;
            right: 14px;
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
        }
        .status-text { text-align: center; margin-top: 12px; font-size: 15px; color: #aaa; }
        .multiplier-display { font-size: 22px; color: #ffd700; margin: 8px 0; font-weight: 700; }
        .footer { text-align: center; font-size: 11px; color: #2a2a3a; margin-top: 16px; }
        .bots-table {
            margin-top: 16px;
            background: #1a1a2a;
            border-radius: 16px;
            padding: 12px;
        }
        .bots-table .row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #2a2a3a;
            font-size: 14px;
        }
        .bots-table .row:last-child { border-bottom: none; }
        .bots-table .win { color: #00ff88; }
        .bots-table .lose { color: #ff4444; }
        .bots-table .bot-name { color: #aaa; }
        .bots-table .bot-bet { color: #ffd700; }
        .cd-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.75);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 56px;
            font-weight: 700;
            color: #ffd700;
            border-radius: 16px;
        }
        .hidden { display: none; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="balance" id="balanceDisplay">💰 0.00$</div>
        <div class="online" id="onlineDisplay">👥 0</div>
    </div>

    <div class="game-selector">
        <button class="game-btn active" id="gameAviator" onclick="selectGame('aviator')">✈️ Aviator</button>
        <button class="game-btn" id="gameRocket" onclick="selectGame('rocket')">🚀 Rocket</button>
        <button class="game-btn" id="gameMiner" onclick="selectGame('miner')">⛏️ Майнер</button>
    </div>

    <div class="bet-section">
        <div class="bet-label">Сумма ставки</div>
        <div class="bet-grid">
            <button class="bet-btn" onclick="selectBet(1)">1$</button>
            <button class="bet-btn" onclick="selectBet(5)">5$</button>
            <button class="bet-btn selected" onclick="selectBet(10)">10$</button>
            <button class="bet-btn" onclick="selectBet(25)">25$</button>
            <button class="bet-btn" onclick="selectBet(50)">50$</button>
            <button class="bet-btn custom" onclick="customBet()">⚡</button>
        </div>
    </div>

    <div class="game-area" id="gameArea">
        <div id="gameContent">
            <div style="text-align:center;color:#888;padding:20px;">👇 Выберите игру<br>и сделайте ставку</div>
            <button class="start-btn" id="startBtn" onclick="startGame()">🚀 СТАРТ</button>
        </div>
    </div>

    <!-- Таблица ботов -->
    <div class="bots-table" id="botsTable">
        <div class="row"><span class="bot-name">🤖 Бот 1</span><span class="bot-bet" id="bot1bet">10$</span><span id="bot1result">⏳</span></div>
        <div class="row"><span class="bot-name">🤖 Бот 2</span><span class="bot-bet" id="bot2bet">25$</span><span id="bot2result">⏳</span></div>
        <div class="row"><span class="bot-name">🤖 Бот 3</span><span class="bot-bet" id="bot3bet">5$</span><span id="bot3result">⏳</span></div>
        <div class="row"><span class="bot-name">🤖 Бот 4</span><span class="bot-bet" id="bot4bet">50$</span><span id="bot4result">⏳</span></div>
        <div class="row"><span class="bot-name">🤖 Бот 5</span><span class="bot-bet" id="bot5bet">15$</span><span id="bot5result">⏳</span></div>
    </div>

    <div class="footer">Casino • v3.29.1</div>
</div>

<script>
    let balance = 0.0;
    let currentGame = 'aviator';
    let currentBet = 10;
    let gameInterval = null;
    let gameActive = false;
    let cdActive = false;
    let tg = window.Telegram?.WebApp;
    let botBets = [];

    // ===== РАБОТА С LOCALSTORAGE =====
    function saveBalance() {
        localStorage.setItem('casino_balance', balance.toString());
    }

    function loadBalance() {
        const saved = localStorage.getItem('casino_balance');
        if (saved !== null) {
            balance = parseFloat(saved);
        } else {
            balance = 100; // Если нет сохранения — стартовый 100$
        }
        updateBalanceUI();
    }

    // ===== ОБНОВЛЕНИЕ UI =====
    function updateBalanceUI() {
        document.getElementById('balanceDisplay').textContent = `💰 ${balance.toFixed(2)}$`;
        saveBalance(); // Автосохранение
    }

    function updateOnlineUI(count) {
        document.getElementById('onlineDisplay').textContent = `👥 ${count}`;
    }

    function updateBetUI() {
        document.querySelectorAll('.bet-btn').forEach(btn => {
            btn.classList.remove('selected');
            if (btn.textContent.includes(currentBet + '$')) {
                btn.classList.add('selected');
            }
        });
    }

    // ===== ОТПРАВКА В БОТ =====
    function sendData(action, payload = {}) {
        const data = JSON.stringify({ action, ...payload });
        if (tg) {
            tg.sendData(data);
        } else {
            console.log('📤 Send:', data);
        }
    }

    function loadData() {
        sendData('get_balance');
        sendData('get_online');
    }

    // ===== Telegram WebApp =====
    if (tg) {
        tg.ready();
        tg.onEvent('data', (data) => {
            try {
                const json = JSON.parse(data);
                if (json.balance !== undefined) {
                    balance = json.balance;
                    updateBalanceUI();
                }
                if (json.win !== undefined) {
                    balance += json.win;
                    updateBalanceUI();
                }
                if (json.online !== undefined) {
                    updateOnlineUI(json.online);
                }
            } catch (e) {}
        });
        setTimeout(loadData, 300);
    } else {
        loadBalance(); // Если без бота — загружаем из localStorage
        updateOnlineUI(42);
    }

    // ===== ГЕНЕРАЦИЯ БОТОВ =====
    function generateBotBets() {
        const names = ['Бот 1', 'Бот 2', 'Бот 3', 'Бот 4', 'Бот 5'];
        botBets = [];
        for (let i = 0; i < 5; i++) {
            const bet = Math.floor(Math.random() * 50) + 1;
            botBets.push({ name: names[i], bet: bet, win: false });
            document.getElementById(`bot${i+1}bet`).textContent = bet + '$';
            document.getElementById(`bot${i+1}result`).textContent = '⏳';
            document.getElementById(`bot${i+1}result`).className = '';
        }
    }

    function updateBots(winnerIndex) {
        for (let i = 0; i < 5; i++) {
            const el = document.getElementById(`bot${i+1}result`);
            if (i === winnerIndex) {
                el.textContent = '✅ ВЫИГРАЛ';
                el.className = 'win';
            } else {
                el.textContent = '❌';
                el.className = 'lose';
            }
        }
    }

    generateBotBets();

    // ===== ВЫБОР ИГРЫ =====
    function selectGame(game) {
        if (cdActive) return;
        currentGame = game;
        document.querySelectorAll('.game-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('game' + game.charAt(0).toUpperCase() + game.slice(1)).classList.add('active');
        if (gameInterval) clearInterval(gameInterval);
        gameActive = false;
        document.getElementById('gameContent').innerHTML = `
            <div style="text-align:center;color:#888;padding:20px;">✅ ${game === 'aviator' ? 'Aviator' : game === 'rocket' ? 'Rocket' : 'Майнер'}</div>
            <button class="start-btn" onclick="startGame()">🚀 СТАРТ</button>
        `;
        generateBotBets();
    }

    // ===== ВЫБОР СТАВКИ =====
    function selectBet(amount) {
        if (cdActive) return;
        currentBet = amount;
        updateBetUI();
    }

    function customBet() {
        if (cdActive) return;
        const amount = prompt('Введите сумму (1-1000$):', '10');
        if (amount && !isNaN(amount) && amount > 0 && amount <= 1000) {
            currentBet = parseFloat(amount);
            updateBetUI();
            document.querySelectorAll('.bet-btn').forEach(b => b.classList.remove('selected'));
        }
    }

    // ===== СТАРТ ИГРЫ =====
    function startGame() {
        if (currentBet > balance) {
            alert('❌ Недостаточно средств!');
            return;
        }
        if (cdActive) return;

        const content = document.getElementById('gameContent');

        if (currentGame === 'miner') {
            balance -= currentBet;
            updateBalanceUI();
            startMiner(content);
            return;
        }

        // КД 10 секунд
        cdActive = true;
        let cd = 10;
        content.innerHTML = `
            <div style="text-align:center;padding:10px 0;">
                <div style="font-size:56px;">${currentGame === 'aviator' ? '✈️' : '🚀'}</div>
                <div style="font-size:22px;color:#ffd700;margin:8px 0;">${currentGame === 'aviator' ? 'Aviator' : 'Rocket'}</div>
                <div style="font-size:48px;font-weight:700;color:#ffd700;" id="cdTimer">${cd}</div>
                <div style="color:#888;">Старт через...</div>
                <div style="font-size:12px;color:#666;margin-top:4px;">Ставка: ${currentBet}$</div>
            </div>
        `;

        const timer = setInterval(() => {
            cd--;
            const cdEl = document.getElementById('cdTimer');
            if (cdEl) cdEl.textContent = cd;
            if (cd <= 0) {
                clearInterval(timer);
                cdActive = false;
                balance -= currentBet;
                updateBalanceUI();
                if (currentGame === 'aviator') startAviator(content);
                else startRocket(content);
            }
        }, 1000);
    }

    // ===== AVIATOR =====
    function startAviator(content) {
        gameActive = true;
        content.innerHTML = `
            <div class="graph">
                <div class="line"></div>
                <div class="label" id="aviatorCoef">1.00x</div>
            </div>
            <div class="multiplier-display" id="aviatorMultiplier">x1.00</div>
            <button class="cashout-btn" id="aviatorCashout" onclick="cashoutAviator()">💰 ЗАБРАТЬ</button>
            <div class="status-text" id="aviatorStatus">Летит...</div>
        `;

        let coef = 1.0;
        const coefLabel = document.getElementById('aviatorCoef');
        const multLabel = document.getElementById('aviatorMultiplier');
        const status = document.getElementById('aviatorStatus');
        const cashoutBtn = document.getElementById('aviatorCashout');

        gameInterval = setInterval(() => {
            if (!gameActive) return;
            coef += 0.02 + Math.random() * 0.05;
            coefLabel.textContent = coef.toFixed(2) + 'x';
            multLabel.textContent = 'x' + coef.toFixed(2);

            const roll = Math.random();
            let crash = false;
            if (roll < 0.50) {
                if (coef >= 3.0) crash = true;
            } else if (roll < 0.80) {
                if (coef >= 4.0) crash = true;
            } else {
                if (coef >= 1.25 + Math.random() * 0.15) crash = true;
            }

            if (crash || coef > 5.0) {
                clearInterval(gameInterval);
                gameActive = false;
                cashoutBtn.disabled = true;
                cashoutBtn.textContent = '💥 CRASH';
                status.textContent = '💥 Проигрыш!';
                sendData('aviator_result', { win: 0 });
                const winner = Math.floor(Math.random() * 5);
                updateBots(winner);
            }
        }, 80);
    }

    function cashoutAviator() {
        if (!gameActive) return;
        const coef = parseFloat(document.getElementById('aviatorCoef').textContent);
        const win = currentBet * coef;
        balance += win;
        updateBalanceUI();
        clearInterval(gameInterval);
        gameActive = false;
        document.getElementById('aviatorCashout').disabled = true;
        document.getElementById('aviatorStatus').textContent = `✅ Выигрыш: ${win.toFixed(2)}$ (x${coef.toFixed(2)})`;
        sendData('aviator_result', { win: win });
        const winner = Math.floor(Math.random() * 5);
        updateBots(winner);
    }

    // ===== ROCKET =====
    function startRocket(content) {
        gameActive = true;
        content.innerHTML = `
            <div style="text-align:center;font-size:64px;">🚀</div>
            <div style="text-align:center;font-size:32px;font-weight:700;margin:12px 0;color:#ffd700;" id="rocketCoef">1.00x</div>
            <button class="cashout-btn" id="rocketCashout" onclick="cashoutRocket()">💰 ЗАБРАТЬ</button>
            <div class="status-text" id="rocketStatus">Взлетает...</div>
        `;

        let coef = 1.0;
        const coefLabel = document.getElementById('rocketCoef');
        const status = document.getElementById('rocketStatus');
        const cashoutBtn = document.getElementById('rocketCashout');

        gameInterval = setInterval(() => {
            if (!gameActive) return;
            coef += 0.03 + Math.random() * 0.07;
            coefLabel.textContent = coef.toFixed(2) + 'x';

            const roll = Math.random();
            let crash = false;
            if (roll < 0.50) {
                if (coef >= 3.0) crash = true;
            } else if (roll < 0.80) {
                if (coef >= 4.0) crash = true;
            } else {
                if (coef >= 1.25 + Math.random() * 0.15) crash = true;
            }

            if (crash || coef > 5.0) {
                clearInterval(gameInterval);
                gameActive = false;
                cashoutBtn.disabled = true;
                cashoutBtn.textContent = '💥 EXPLODED';
                status.textContent = '💥 Проигрыш!';
                sendData('rocket_result', { win: 0 });
                const winner = Math.floor(Math.random() * 5);
                updateBots(winner);
            }
        }, 80);
    }

    function cashoutRocket() {
        if (!gameActive) return;
        const coef = parseFloat(document.getElementById('rocketCoef').textContent);
        const win = currentBet * coef;
        balance += win;
        updateBalanceUI();
        clearInterval(gameInterval);
        gameActive = false;
        document.getElementById('rocketCashout').disabled = true;
        document.getElementById('rocketStatus').textContent = `✅ Выигрыш: ${win.t
